name: Sync cfnew

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-cfnew.yml"
      - "wrangler.toml"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download cfnew source as _worker.js
        shell: bash
        run: |
          curl -fL "https://raw.githubusercontent.com/byJoey/cfnew/main/%E5%B0%91%E5%B9%B4%E4%BD%A0%E7%9B%B8%E4%BF%A1%E5%85%89%E5%90%97" -o "_worker.js"
          test -s "_worker.js"

      - name: Commit updated _worker.js
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: "chore: sync cfnew"
          file_pattern: "_worker.js"
